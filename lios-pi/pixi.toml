[pypi-dependencies]
pi = { path = ".", editable = true }
tqdm_loggable = ">=0.2, <0.3"
#lerobot = { git = "https://github.com/huggingface/lerobot", rev = "0cf864870cf29f4738d3ade893e6fd13fbd7cdb5" }
lmdb = "*"
msgspec = "*"
# lerobot = "==0.1.0"

graphviz = "*"
torchcodec = "*"

[feature.dev.dependencies]
ipywidgets = "*"
pre-commit = "*"
